name: Deploy

"on":
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CAPROVER_SERVER: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-SERVER
          CAPROVER_APP: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-APP
          CAPROVER_TOKEN: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-TOKEN
          DATABASE_URL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/DATABASE_URL
          BETTER_AUTH_SECRET: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/BETTER_AUTH_SECRET
          BETTER_AUTH_URL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/BETTER_AUTH_URL
          SUPERADMIN_EMAIL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/SUPERADMIN_EMAIL
          SUPERADMIN_PASSWORD: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/SUPERADMIN_PASSWORD
          CRON_SECRET: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CRON_SECRET

      - name: Update CapRover env vars
        run: |
          curl -s -X POST \
            "$CAPROVER_SERVER/api/v2/user/apps/appDefinitions/update" \
            -H "x-captain-auth: $CAPROVER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "appName": "'"$CAPROVER_APP"'",
              "envVars": [
                {"key": "DATABASE_URL", "value": "'"$DATABASE_URL"'"},
                {"key": "BETTER_AUTH_SECRET", "value": "'"$BETTER_AUTH_SECRET"'"},
                {"key": "BETTER_AUTH_URL", "value": "'"$BETTER_AUTH_URL"'"},
                {"key": "SUPERADMIN_EMAIL", "value": "'"$SUPERADMIN_EMAIL"'"},
                {"key": "SUPERADMIN_PASSWORD", "value": "'"$SUPERADMIN_PASSWORD"'"},
                {"key": "CRON_SECRET", "value": "'"$CRON_SECRET"'"}
              ]
            }'

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ env.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP }}
          token: ${{ env.CAPROVER_TOKEN }}
