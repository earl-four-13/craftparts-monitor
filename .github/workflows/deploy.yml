name: Deploy

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          CAPROVER_URL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-SERVER
          CAPROVER_PASSWORD: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-PASSWORD
          CAPROVER_APP: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CAPROVER-APP
          DATABASE_URL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/DATABASE_URL
          BETTER_AUTH_SECRET: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/BETTER_AUTH_SECRET
          BETTER_AUTH_URL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/BETTER_AUTH_URL
          SUPERADMIN_EMAIL: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/SUPERADMIN_EMAIL
          SUPERADMIN_PASSWORD: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/SUPERADMIN_PASSWORD
          CRON_SECRET: op://gtify7esp5ovvvzyekun4zxgya/craftparts-monitor-dev/CRON_SECRET

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }},ghcr.io/${{ github.repository }}:latest

      - name: Update CapRover env vars
        run: |
          # Login to get JWT
          TOKEN=$(curl -s -X POST "$CAPROVER_URL/api/v2/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg pw "$CAPROVER_PASSWORD" '{password: $pw}')" \
            | jq -r '.data.token')

          # Update env vars using JWT
          curl -s -X POST "$CAPROVER_URL/api/v2/user/apps/appDefinitions/update" \
            -H "x-captain-auth: $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg app "$CAPROVER_APP" \
              --arg db "$DATABASE_URL" \
              --arg secret "$BETTER_AUTH_SECRET" \
              --arg url "$BETTER_AUTH_URL" \
              --arg email "$SUPERADMIN_EMAIL" \
              --arg pass "$SUPERADMIN_PASSWORD" \
              --arg cron "$CRON_SECRET" \
              '{
                appName: $app,
                envVars: [
                  {key: "DATABASE_URL", value: $db},
                  {key: "BETTER_AUTH_SECRET", value: $secret},
                  {key: "BETTER_AUTH_URL", value: $url},
                  {key: "SUPERADMIN_EMAIL", value: $email},
                  {key: "SUPERADMIN_PASSWORD", value: $pass},
                  {key: "CRON_SECRET", value: $cron}
                ]
              }')"

      - name: Deploy image to CapRover
        run: |
          npm install -g caprover
          caprover deploy \
            --caproverUrl "$CAPROVER_URL" \
            --caproverPassword "$CAPROVER_PASSWORD" \
            --appName "$CAPROVER_APP" \
            --imageName "ghcr.io/${{ github.repository }}:${{ github.sha }}"
